name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  GO_VERSION: "1.26"
  WAILS_VERSION: v2.12.0

jobs:
  # The core needs no GUI, no display, and no cgo, so it is tested on its own.
  # Keeping it separate means a crypto regression reports in ~30s instead of
  # waiting behind three native desktop builds.
  core:
    name: Core tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      # Real age, used as an interop oracle. Without it the interop tests skip
      # themselves and quietly prove nothing, so install it explicitly.
      # Post-quantum keys need >= 1.3.0.
      - name: Install age CLI
        run: |
          curl -fsSL https://github.com/FiloSottile/age/releases/download/v1.3.1/age-v1.3.1-linux-amd64.tar.gz \
            | tar -xz -C /tmp
          sudo install /tmp/age/age /tmp/age/age-keygen /usr/local/bin/
          age --version

      - name: Verify interop tests are not skipping
        run: |
          go test ./internal/service/ -run TestInterop -v 2>&1 | tee out.txt
          if grep -q -- "--- SKIP" out.txt; then
            echo "::error::Interop tests skipped; the age oracle is not working"
            exit 1
          fi

      - run: go vet ./...

      # The BSD/MIT/Apache dependencies require their notices to be reproduced
      # in binary distributions, and those notices ship inside every package.
      # Regenerate and diff, so adding a dependency cannot silently leave the
      # published packages in violation.
      - name: Third-party licenses are up to date
        run: |
          sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
          ./scripts/gen-third-party-licenses.sh > /tmp/tpl.md
          if ! diff -u THIRD_PARTY_LICENSES.md /tmp/tpl.md; then
            echo "::error::THIRD_PARTY_LICENSES.md is stale. Run ./scripts/gen-third-party-licenses.sh > THIRD_PARTY_LICENSES.md"
            exit 1
          fi

      - name: gofmt
        run: |
          unformatted=$(gofmt -l . | grep -v node_modules || true)
          if [ -n "$unformatted" ]; then
            echo "::error::Not gofmt'd: $unformatted"
            exit 1
          fi

      - name: Test with race detector
        run: go test -race ./...

  frontend:
    name: Frontend check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm run build

  # cgo does not cross-compile cleanly, so every OS builds on its own runner.
  # Do not be tempted to collapse this into a GOOS matrix on ubuntu.
  build:
    name: Build (${{ matrix.os }})
    needs: [core, frontend]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            # Ubuntu 24.04 dropped libwebkit2gtk-4.0-dev — only 4.1 remains,
            # exactly as on Fedora 40+. Wails links 4.0 unless told otherwise,
            # so the tag is mandatory here too.
            tags: webkit2_41
          - os: windows-latest
            tags: ""
          - os: macos-latest
            tags: ""
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Linux GUI dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Build
        run: wails build ${{ matrix.tags && format('-tags {0}', matrix.tags) || '' }}

      - uses: actions/upload-artifact@v4
        with:
          name: age-gui-${{ matrix.os }}
          path: build/bin/*
          if-no-files-found: error
